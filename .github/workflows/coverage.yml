name: Coverage

on:
  push:
    branches:
      - main
      - develop
      - feature/dev-improvements
  pull_request:

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate coverage report
        working-directory: RickandMorty
        run: bash ./gradlew clean jacocoRepoReport

      - name: Update coverage in README files
        run: python3 scripts/update_coverage_readme.py

      - name: Publish coverage summary
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("RickandMorty/build/reports/jacoco/jacocoRepoReport/jacocoRepoReport.xml")
          root = ET.parse(report).getroot()
          line_counter = next(counter for counter in root.findall("counter") if counter.attrib["type"] == "LINE")
          missed = int(line_counter.attrib["missed"])
          covered = int(line_counter.attrib["covered"])
          total = missed + covered
          percent = 0.0 if total == 0 else (covered * 100.0 / total)

          summary = Path(".github_step_summary.md")
          summary.write_text(
              "\n".join(
                  [
                      "## Coverage Report",
                      f"- Line coverage: `{percent:.2f}%`",
                      f"- Covered lines: `{covered}`",
                      f"- Missed lines: `{missed}`",
                      "- HTML report: `RickandMorty/build/reports/jacoco/jacocoRepoReport/html/index.html`",
                  ]
              ) + "\n",
              encoding="utf-8",
          )
          PY
          cat .github_step_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit coverage badge update
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.pt-BR.md
          git diff --staged --quiet || git commit -m "docs(readme): refresh coverage badge [skip ci]"
          git push
